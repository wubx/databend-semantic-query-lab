entity:
  name: Orders
  title: 订单
  description: 基于 Databend 中 tpch_100.orders 表的订单主题语义模型，用于按订单状态、订单优先级和下单日期分析订单数量及订单记录金额。数据来自 TPC-H SF100 决策支持测试集，不代表真实生产业务。
  source:
    schema: tpch_100
    table: orders
  keys:
    primary: orderKey
  dimensions:
    - name: orderKey
      title: 订单编号
      description: 每张订单的唯一标识，也是订单数据的主键。
      expr: o_orderkey
      type: number
      synonyms:
        - 订单号
        - 订单 ID
        - 订单标识
        - order ID
        - order number
        - order key
      business_definition: 用于唯一识别一张订单的编号，对应 orders 表的 o_orderkey；每行订单记录对应一个订单编号。
    - name: customerKey
      title: 客户编号
      description: 下达该订单的客户标识。
      expr: o_custkey
      type: number
      synonyms:
        - 客户号
        - 客户 ID
        - 客户标识
        - customer ID
        - customer number
        - customer key
      business_definition: 用于标识订单所属客户的编号，对应 orders 表的 o_custkey，可用于关联客户主题；该字段是维度或关联键，不作为求和指标。
    - name: status
      title: 订单状态
      description: 订单记录中的状态代码，包括 F、O 和 P。
      expr: o_orderstatus
      type: string
      synonyms:
        - 订单阶段
        - 状态代码
        - 订单状态代码
        - order status
        - order state
        - status code
      enum:
        - F
        - O
        - P
      business_definition: 订单当前状态的代码，对应 orders 表的 o_orderstatus。现有元数据将 F 描述为已完成、O 描述为未完成或开放、P 描述为处理中或待处理；最终中文展示名称仍需人工确认。
    - name: priority
      title: 订单优先级
      description: 分配给订单的处理优先级。
      expr: o_orderpriority
      type: string
      synonyms:
        - 优先级
        - 订单处理优先级
        - 处理优先级
        - order priority
        - processing priority
        - priority
      business_definition: 用于表示订单处理优先顺序的分类字段，对应 orders 表的 o_orderpriority。
  time_dimensions:
    - name: orderDate
      title: 下单日期
      description: 订单被下达或记录的日期。
      expr: o_orderdate
      type: time
      synonyms:
        - 订单日期
        - 下单时间
        - 订单时间
        - order date
        - order time
        - purchase order date
      business_definition: 订单的下单日期，对应 orders 表的 o_orderdate，可作为订单分析的时间维度。
  facts:
    - name: orderTotal
      title: 单笔订单记录金额
      description: 单张订单记录的总价格字段。
      expr: o_totalprice
      type: decimal
      business_definition: 订单粒度的金额事实，对应 orders 表的 o_totalprice。该字段表示数据中记录的单笔订单总价格；币种及实际业务口径尚未确认。
      governance:
        status: validated
        grain: order
        unit: currency
        currency: unknown
        additivity: non_additive
        allowed_uses:
          - order_detail
          - order_ranking
          - governed_measure_input
        prohibited_interpretations:
          - GMV
          - revenue
      synonyms:
        - 单笔订单金额
        - 订单记录金额
        - 订单总价
        - order total
        - order total price
        - recorded order amount
  metrics:
    - name: count
      title: 订单数量
      description: 订单记录的数量。
      type: count
      expr: orderKey
      synonyms:
        - 订单数
        - 订单总数
        - 订单笔数
        - order count
        - number of orders
        - total orders
      business_definition: 按订单主键 orderKey 统计的订单数量，用于衡量当前分析范围内包含多少张订单。
      governance:
        status: certified
        grain: query_result
        unit: order
        additivity: additive
    - name: totalPrice
      title: 订单记录金额合计
      description: 对各订单记录的总价格进行求和得到的候选指标。
      type: sum
      expr: orderTotal
      synonyms:
        - 订单金额合计
        - 订单总价合计
        - 订单记录总金额
        - total order price
        - sum of order totals
        - total recorded order amount
      business_definition: 对订单粒度事实 orderTotal 求和，反映当前分析范围内 o_totalprice 的合计值。该指标不应直接解释为真实业务 GMV；币种和实际业务口径需人工确认。
      governance:
        status: validated
        grain: query_result
        unit: currency
        currency: unknown
        additivity: additive
        allowed_uses:
          - order_amount_aggregation
          - dimension_comparison
          - time_trend
        prohibited_interpretations:
          - GMV
          - revenue
  governance:
    status: validated
    grain: order
    owner: demo-team
    warnings:
      - 金额字段的币种和真实业务口径尚未确认。
      - Orders.totalPrice 不应直接命名为 GMV、销售收入或营收。
  filters:
    - name: fulfilled
      title: 已完成订单
      description: 仅包含订单状态代码为 F 的订单。
      expr: ${CUBE}.o_orderstatus = 'F'
      synonyms:
        - 完成订单
        - 状态为 F 的订单
        - F 状态订单
        - fulfilled orders
        - completed orders
        - orders with status F
      business_definition: 订单筛选条件，对应 o_orderstatus = 'F'，用于保留 TPC-H 状态代码为 F 的订单记录。
