api_version: semantic.databend.dev/v1alpha1
kind: SemanticManifest

metadata:
  name: tpch_order_analytics
  description: Governed TPC-H order analytics for Cube, Databend, and AI query planning.
  owner: demo-team
  tags:
    domain: sales
    sensitivity: internal

entities:
  - name: Orders
    title: 订单
    description: TPC-H customer purchase orders.
    source:
      schema: tpch_100
      table: orders
    keys:
      primary: orderKey

    dimensions:
      - name: orderKey
        title: 订单编号
        description: Unique identifier of an order.
        expr: o_orderkey
        type: number
        synonyms: [order id, order number, 订单号, 订单编号]

      - name: customerKey
        title: 客户编号
        description: Identifier of the customer that placed the order.
        expr: o_custkey
        type: number
        synonyms: [customer id, 客户 ID, 客户编号]

      - name: status
        title: 订单状态
        description: F is fulfilled, O is open, and P is pending.
        expr: o_orderstatus
        type: string
        synonyms: [status, order state, 订单状态, 订单阶段]
        enum: [F, O, P]

      - name: priority
        title: 订单优先级
        description: Processing priority assigned to an order.
        expr: o_orderpriority
        type: string
        synonyms: [priority, order priority, 订单优先级]

    time_dimensions:
      - name: orderDate
        title: 订单日期
        description: Date on which the order was placed.
        expr: o_orderdate
        type: time
        synonyms: [order date, order time, 下单日期, 订单时间]

    facts:
      - name: orderTotal
        title: 单笔订单金额
        description: Total price recorded on an individual order.
        expr: o_totalprice
        type: decimal

    metrics:
      - name: count
        title: 订单数量
        description: Number of orders.
        type: count
        expr: orderKey
        synonyms: [order count, number of orders, 订单数量, 订单总数]

      - name: totalPrice
        title: 订单总金额
        description: Sum of total prices across orders.
        type: sum
        expr: orderTotal
        synonyms: [total order amount, sales amount, GMV, 订单金额, 订单总金额]

    filters:
      - name: fulfilled
        title: 已完成订单
        description: Orders whose TPC-H status is F.
        expr: "${CUBE}.o_orderstatus = 'F'"
        synonyms: [completed orders, fulfilled orders, 已完成订单]

  - name: LineItem
    title: 订单明细
    description: TPC-H product line items shipped for customer orders.
    source:
      schema: tpch_100
      table: lineitem
    keys:
      primary: lineItemKey

    dimensions:
      - name: lineItemKey
        title: 订单明细唯一键
        description: Composite TPC-H line-item key built from order number and line number.
        expr: "CONCAT(CAST(l_orderkey AS STRING), '-', CAST(l_linenumber AS STRING))"
        type: string
        access: private

      - name: orderKey
        title: 订单编号
        description: Identifier of the order containing this line item.
        expr: l_orderkey
        type: number
        synonyms: [order id, 订单编号]

      - name: partKey
        title: 商品编号
        description: Identifier of the ordered part.
        expr: l_partkey
        type: number
        synonyms: [part id, product id, 商品编号]

      - name: supplierKey
        title: 供应商编号
        description: Identifier of the supplier fulfilling the line item.
        expr: l_suppkey
        type: number
        synonyms: [supplier id, 供应商编号]

      - name: lineNumber
        title: 明细行号
        description: Position of the line item within its order.
        expr: l_linenumber
        type: number
        synonyms: [line number, 明细行号]

      - name: lineStatus
        title: 明细状态
        description: TPC-H processing status of a line item.
        expr: l_linestatus
        type: string
        synonyms: [line status, 明细状态]
        enum: [F, O]

      - name: returnFlag
        title: 退货标记
        description: TPC-H return status flag.
        expr: l_returnflag
        type: string
        synonyms: [return flag, 退货标记, 退货状态]
        enum: [A, N, R]

      - name: shipMode
        title: 运输方式
        description: Shipping mode used for a line item.
        expr: l_shipmode
        type: string
        synonyms: [shipping mode, delivery mode, 运输方式]

      - name: shipInstruction
        title: 运输指令
        description: Shipping instruction for a line item.
        expr: l_shipinstruct
        type: string
        synonyms: [shipping instruction, 运输指令]

    time_dimensions:
      - name: shipDate
        title: 发货日期
        description: Date on which the line item was shipped.
        expr: l_shipdate
        type: time
        synonyms: [ship date, shipping date, 发货日期, 发货时间]

      - name: commitDate
        title: 承诺日期
        description: Date by which shipment was committed.
        expr: l_commitdate
        type: time
        synonyms: [commit date, promised date, 承诺日期]

      - name: receiptDate
        title: 收货日期
        description: Date on which the line item was received.
        expr: l_receiptdate
        type: time
        synonyms: [receipt date, delivery date, 收货日期]

    facts:
      - name: quantity
        title: 明细商品数量
        description: Quantity recorded on an individual line item.
        expr: l_quantity
        type: decimal

      - name: extendedPrice
        title: 明细扩展价格
        description: Extended price before discount and tax.
        expr: l_extendedprice
        type: decimal

      - name: discountRate
        title: 明细折扣率
        description: Discount rate applied to an individual line item.
        expr: l_discount
        type: decimal

      - name: taxRate
        title: 明细税率
        description: Tax rate applied to an individual line item.
        expr: l_tax
        type: decimal

    metrics:
      - name: count
        title: 订单明细数量
        description: Number of order line items.
        type: count
        expr: lineNumber
        synonyms: [line item count, 订单明细数量, 明细行数量]

      - name: totalQuantity
        title: 发货商品数量
        description: Sum of quantities across line items.
        type: sum
        expr: quantity
        synonyms:
          [
            shipped quantity,
            total quantity,
            发货商品数量,
            发货数量,
            商品总数量,
            销量,
          ]

      - name: grossAmount
        title: 折扣前金额
        description: Sum of extended prices before discount and tax.
        type: sum
        expr: extendedPrice
        synonyms: [gross amount, extended price, 折扣前金额, 商品原价总额]

      - name: discountAmount
        title: 折扣金额
        description: Sum of extended price multiplied by discount rate.
        type: sum
        expr: l_extendedprice * l_discount
        synonyms: [discount amount, 折扣金额]

      - name: discountedRevenue
        title: 折扣后收入
        description: Revenue after discount and before tax.
        type: sum
        expr: l_extendedprice * (1 - l_discount)
        synonyms: [discounted revenue, net sales, 折扣后收入, 净销售额]

      - name: chargedAmount
        title: 含税收入
        description: Revenue after discount and tax.
        type: sum
        expr: l_extendedprice * (1 - l_discount) * (1 + l_tax)
        synonyms: [charged amount, revenue with tax, 含税收入]

      - name: averageDiscount
        title: 平均折扣率
        description: Average discount rate across line items.
        type: avg
        expr: discountRate
        synonyms: [average discount, avg discount, 平均折扣, 平均折扣率]

      - name: delayedCount
        title: 延迟收货明细数量
        description: Number of line items received after their committed date.
        type: count
        expr: lineNumber
        filters:
          - sql: '"line_item".l_receiptdate > "line_item".l_commitdate'
        synonyms: [delayed count, late receipt count, 延迟数量, 延迟明细数量]

      - name: onTimeCount
        title: 准时收货明细数量
        description: Number of line items received by their committed date.
        type: count
        expr: lineNumber
        filters:
          - sql: '"line_item".l_receiptdate <= "line_item".l_commitdate'
        synonyms:
          [on-time count, punctual receipt count, 准时数量, 准时明细数量]

      - name: averageTransitDays
        title: 平均运输天数
        description: Average calendar days from shipment to receipt; lower is better.
        type: avg
        expr: "DATEDIFF(DAY, l_shipdate, l_receiptdate)"
        format: decimal
        synonyms:
          [average transit days, shipping duration, 平均运输时长, 平均运输天数]

      - name: averageDelayDays
        title: 平均延迟天数
        description: Average days from committed date to receipt for delayed line items; lower is better.
        type: avg
        expr: "DATEDIFF(DAY, l_commitdate, l_receiptdate)"
        filters:
          - sql: '"line_item".l_receiptdate > "line_item".l_commitdate'
        format: decimal
        synonyms:
          [average delay days, average lateness, 平均延迟天数, 平均逾期天数]

    filters:
      - name: delayedReceipt
        title: 延迟收货明细
        description: Line items received after their committed date.
        expr: "${CUBE}.l_receiptdate > ${CUBE}.l_commitdate"
        synonyms: [late receipt, delayed delivery, 延迟收货, 延迟交付]

    extensions:
      cube:
        refresh_key: false

  - name: Customer
    title: 客户
    description: TPC-H customers who place orders.
    source:
      schema: tpch_100
      table: customer
    keys:
      primary: customerKey
    dimensions:
      - name: customerKey
        title: 客户编号
        expr: c_custkey
        type: number
        synonyms: [customer id, 客户编号]
      - name: name
        title: 客户名称
        expr: c_name
        type: string
        synonyms: [customer name, 客户名称]
      - name: nationKey
        title: 国家编号
        expr: c_nationkey
        type: number
        synonyms: [nation id, country id, 国家编号]
      - name: marketSegment
        title: 市场细分
        expr: c_mktsegment
        type: string
        synonyms: [market segment, 客户细分, 市场细分]
    facts:
      - name: accountBalance
        title: 客户账户余额
        expr: c_acctbal
        type: decimal
    metrics:
      - name: count
        title: 客户数量
        description: Number of customers.
        type: count
        expr: customerKey
        synonyms: [customer count, 客户数量]
      - name: totalAccountBalance
        title: 客户账户余额总计
        description: Sum of customer account balances.
        type: sum
        expr: accountBalance
        synonyms: [total account balance, 客户余额总计]
    extensions:
      cube:
        refresh_key: false

  - name: Supplier
    title: 供应商
    description: TPC-H suppliers that fulfill line items.
    source:
      schema: tpch_100
      table: supplier
    keys:
      primary: supplierKey
    dimensions:
      - name: supplierKey
        title: 供应商编号
        expr: s_suppkey
        type: number
        synonyms: [supplier id, 供应商编号]
      - name: name
        title: 供应商名称
        expr: s_name
        type: string
        synonyms: [supplier name, 供应商名称]
      - name: nationKey
        title: 国家编号
        expr: s_nationkey
        type: number
        synonyms: [nation id, country id, 国家编号]
    facts:
      - name: accountBalance
        title: 供应商账户余额
        expr: s_acctbal
        type: decimal
    metrics:
      - name: count
        title: 供应商数量
        description: Number of suppliers.
        type: count
        expr: supplierKey
        synonyms: [supplier count, 供应商数量]
      - name: totalAccountBalance
        title: 供应商账户余额总计
        description: Sum of supplier account balances.
        type: sum
        expr: accountBalance
        synonyms: [supplier balance, 供应商余额总计]
    extensions:
      cube:
        refresh_key: false

  - name: Nation
    title: 国家
    description: TPC-H nations used by customers and suppliers.
    source:
      schema: tpch_100
      table: nation
    keys:
      primary: nationKey
    dimensions:
      - name: nationKey
        title: 国家编号
        expr: n_nationkey
        type: number
        synonyms: [nation id, country id, 国家编号]
      - name: name
        title: 国家名称
        expr: n_name
        type: string
        synonyms: [nation, country, 国家, 国家名称]
      - name: regionKey
        title: 区域编号
        expr: n_regionkey
        type: number
        synonyms: [region id, 区域编号]
    metrics:
      - name: count
        title: 国家数量
        description: Number of nations.
        type: count
        expr: nationKey
        synonyms: [nation count, 国家数量]
    extensions:
      cube:
        refresh_key: false

  - name: Region
    title: 区域
    description: TPC-H geographic sales regions.
    source:
      schema: tpch_100
      table: region
    keys:
      primary: regionKey
    dimensions:
      - name: regionKey
        title: 区域编号
        expr: r_regionkey
        type: number
        synonyms: [region id, 区域编号]
      - name: name
        title: 区域名称
        expr: r_name
        type: string
        synonyms: [region, region name, 区域, 区域名称]
    metrics:
      - name: count
        title: 区域数量
        description: Number of regions.
        type: count
        expr: regionKey
        synonyms: [region count, 区域数量]
    extensions:
      cube:
        refresh_key: false

relationships:
  - name: orders_customer
    from: Orders
    to: Customer
    cardinality: many_to_one
    sql: '"orders".o_custkey = "customer".c_custkey'
    columns:
      - from: o_custkey
        to: c_custkey

  - name: customer_nation
    from: Customer
    to: Nation
    cardinality: many_to_one
    sql: '"customer".c_nationkey = "nation".n_nationkey'
    columns:
      - from: c_nationkey
        to: n_nationkey

  - name: supplier_nation
    from: Supplier
    to: Nation
    cardinality: many_to_one
    sql: '"supplier".s_nationkey = "nation".n_nationkey'
    columns:
      - from: s_nationkey
        to: n_nationkey

  - name: nation_region
    from: Nation
    to: Region
    cardinality: many_to_one
    sql: '"nation".n_regionkey = "region".r_regionkey'
    columns:
      - from: n_regionkey
        to: r_regionkey

  - name: lineitem_orders
    from: LineItem
    to: Orders
    cardinality: many_to_one
    sql: '"line_item".l_orderkey = "orders".o_orderkey'
    columns:
      - from: l_orderkey
        to: o_orderkey

  - name: lineitem_supplier
    from: LineItem
    to: Supplier
    cardinality: many_to_one
    sql: '"line_item".l_suppkey = "supplier".s_suppkey'
    columns:
      - from: l_suppkey
        to: s_suppkey

verified_queries:
  - id: S1
    title: 订单总数
    question: 订单总数是多少？
    examples: [订单总数是多少, 一共有多少订单, 统计订单数量]
    route: semantic
    cube_query:
      measures: [Orders.count]
    verified_by: demo-team
    expected_result:
      columns: [Orders.count]
      min_rows: 1
    result:
      summary_template: "订单总数为 {Orders.count}。"

  - id: S2
    title: 按状态统计订单金额
    question: 按订单状态统计订单金额。
    examples: [按订单状态统计订单金额, 各状态订单金额是多少, 订单金额按状态分组]
    route: semantic
    cube_query:
      measures: [Orders.count, Orders.totalPrice]
      dimensions: [Orders.status]
      order:
        Orders.totalPrice: desc
    verified_by: demo-team
    expected_result:
      columns: [Orders.status, Orders.count, Orders.totalPrice]
      min_rows: 1

  - id: S3
    title: 每月订单金额趋势
    question: 每月订单金额趋势是什么？
    examples: [每月订单金额趋势, 按月统计订单金额, 订单金额月度变化]
    route: semantic
    cube_query:
      measures: [Orders.totalPrice]
      timeDimensions:
        - dimension: Orders.orderDate
          granularity: month
      order:
        Orders.orderDate: asc
      limit: 120
    verified_by: demo-team

  - id: S4
    title: 按年统计发货商品数量
    question: 按年统计发货商品数量。
    examples: [按年统计发货商品数量, 每年发货多少商品, 发货数量年度趋势]
    route: semantic
    cube_query:
      measures: [LineItem.totalQuantity]
      timeDimensions:
        - dimension: LineItem.shipDate
          granularity: year
      order:
        LineItem.shipDate: asc
      limit: 100
    verified_by: demo-team

  - id: S5
    title: 延迟收货明细数量
    question: 统计延迟收货的明细数量。
    examples: [统计延迟收货的明细数量, 有多少延迟收货明细, 延迟交付明细数量]
    route: semantic
    cube_query:
      measures: [LineItem.count]
      segments: [LineItem.delayedReceipt]
    verified_by: demo-team
    result:
      summary_template: "延迟收货的明细数量为 {LineItem.count} 条。"

  - id: S6
    title: 运输方式效率分析
    question: 分析运输方式及效率。
    examples:
      [
        分析运输方式及效率,
        各运输方式的运输效率,
        比较不同运输方式的延迟率,
        哪种运输方式效率最高,
      ]
    route: semantic
    cube_query:
      measures:
        - LineItem.count
        - LineItem.totalQuantity
        - LineItem.delayedCount
        - LineItem.averageTransitDays
        - LineItem.averageDelayDays
      dimensions: [LineItem.shipMode]
      order:
        LineItem.delayedCount: desc
      limit: 100
    verified_by: demo-team

  - id: S7
    title: 按区域统计订单金额
    question: 按区域统计订单金额。
    examples: [按区域统计订单金额, 各区域订单金额是多少, 区域销售额排名]
    route: semantic
    cube_query:
      measures: [Orders.count, Orders.totalPrice]
      dimensions: [Region.name]
      order:
        Orders.totalPrice: desc
      limit: 100
    verified_by: demo-team
    expected_result:
      columns: [Region.name, Orders.count, Orders.totalPrice]
      min_rows: 1

ai_policy:
  question_scope: Only answer questions supported by modeled TPC-H concepts or certified SQL templates.
  prefer_semantic_queries: true
  allow_free_sql: false
  reject_write_operations: true

extensions:
  cube:
    refresh_key:
      every: 1 hour
